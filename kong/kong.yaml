_format_version: "3.0"
_transform: true

services:
  - name: cloud-accounts-service
    host: accounts_upstream
    protocol: http
    port: 8080
    routes:
      - name: cloud-accounts-route
        paths:
          - /cloud-accounts
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: false
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              fault_tolerant: true
              hide_client_headers: false
          - name: request-size-limiting
            config:
              allowed_payload_size: 2
              size_unit: kilobytes
          - name: file-log
            config:
              path: /tmp/kong-audit.log
              reopen: true

upstreams:
  - name: accounts_upstream
    targets:
      - target: ACCOUNTS_MS_IP:8080
        weight: 100

consumers:
  - username: bite-financial-team
    keyauth_credentials:
      - key: bite-key-prod-001
